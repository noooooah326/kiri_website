<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F4EF" />
  <meta name="color-scheme" content="light" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Kiri — Private Archive</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #F7F4EF;
      --text: #1F1F1F;
      --secondary: #77736C;
      --accent: #C8B8A6;
      --accent-soft: rgba(200, 184, 166, 0.42);
      --secondary-soft: rgba(119, 115, 108, 0.78);
      --safe-area-top: env(safe-area-inset-top, 0px);
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
      --safe-area-left: env(safe-area-inset-left, 0px);
      --safe-area-right: env(safe-area-inset-right, 0px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      background-color: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    html::before,
    html::after {
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      height: max(88px, var(--safe-area-top), var(--safe-area-bottom));
      pointer-events: none;
      background-color: var(--bg);
      z-index: 0;
    }

    html::before {
      top: 0;
    }

    html::after {
      bottom: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-color: var(--bg);
      background:
        radial-gradient(circle at 28% 26%, rgba(255, 255, 255, 0.52), transparent 30%),
        radial-gradient(circle at 72% 70%, rgba(200, 184, 166, 0.10), transparent 34%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.36), rgba(200, 184, 166, 0.09)),
        var(--bg);
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.17;
      mix-blend-mode: multiply;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.18'/%3E%3C/svg%3E");
      z-index: 1;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-height: 640px;
      isolation: isolate;
      z-index: 2;
      animation: pageEnter 500ms cubic-bezier(.22,.61,.36,1) both;
    }

    .corner-label,
    .status,
    .microcopy,
    .enter {
      position: absolute;
      color: var(--secondary-soft);
      font-size: 13px;
      line-height: 1;
      font-weight: 400;
      letter-spacing: 0.02em;
      opacity: 0;
    }

    .corner-label,
    .status {
      transform: translateY(6px);
      animation: fadeUp 900ms cubic-bezier(.2,.8,.2,1) forwards;
    }

    .corner-label {
      top: 7.2vh;
      left: 3.1vw;
      animation-delay: 160ms;
    }

    .menu-button {
      position: absolute;
      top: 6.7vh;
      right: 3.25vw;
      width: 36px;
      height: 28px;
      border: 0;
      background: transparent;
      cursor: pointer;
      z-index: 20;
      opacity: 0;
      animation: fadeUp 900ms cubic-bezier(.2,.8,.2,1) 220ms forwards;
    }

    .menu-button.open {
      visibility: hidden;
      pointer-events: none;
    }

    .menu-button span {
      display: block;
      width: 100%;
      height: 1.2px;
      margin: 0 0 9px;
      background: var(--accent);
      transform-origin: center;
      transition: background 320ms ease;
    }

    .menu-button:hover span {
      background: var(--text);
    }

    .hero {
      position: absolute;
      top: 41.2%;
      left: 50%;
      width: min(720px, 86vw);
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .wordmark {
      --wordmark-offset-x: clamp(5px, 0.52vw, 8px);
      --wordmark-offset-y: 0px;
      color: #1F1F1F;
      font-size: clamp(70px, 7.4vw, 118px);
      font-weight: 400;
      letter-spacing: 0.105em;
      line-height: 0.88;
      opacity: 1;
      transform: translate(var(--wordmark-offset-x), var(--wordmark-offset-y));
      text-rendering: geometricPrecision;
    }

    .typewriter {
      display: inline-grid;
      grid-template-columns: repeat(4, 1ch) 0.38ch;
      column-gap: 0.105em;
      justify-content: center;
      letter-spacing: 0;
    }

    .type-slot {
      position: relative;
      display: inline-block;
      width: 1ch;
      min-height: 0.88em;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 240ms ease, transform 300ms cubic-bezier(.2,.8,.2,1);
    }

    .type-slot.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .type-slot.cursor::after {
      content: "_";
      position: absolute;
      left: 0;
      bottom: -0.06em;
      color: var(--accent);
      opacity: 0.82;
      animation: cursorPulse 1100ms ease-in-out infinite;
    }

    .subtitle {
      margin-top: 42px;
      color: var(--secondary);
      font-size: clamp(15px, 1.42vw, 22px);
      font-weight: 300;
      letter-spacing: 0.005em;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 1000ms cubic-bezier(.2,.8,.2,1) 300ms forwards;
    }

    .divider {
      width: 42px;
      height: 1px;
      margin: 42px auto 0;
      background: var(--accent-soft);
      opacity: 0;
      transform: scaleX(0.5);
      animation: lineReveal 900ms cubic-bezier(.2,.8,.2,1) 560ms forwards;
    }

    .microcopy {
      top: calc(41.2% + 160px);
      left: 50%;
      transform: translateX(-50%);
      width: max-content;
      max-width: 90vw;
      text-align: center;
      font-size: clamp(9px, 0.78vw, 12px);
      letter-spacing: 0.035em;
      animation: fadeIn 900ms cubic-bezier(.2,.8,.2,1) 720ms forwards;
    }

    .enter {
      left: 50%;
      bottom: 10.7vh;
      transform: translateX(-50%);
      text-align: center;
      font-size: clamp(12px, 1vw, 16px);
      letter-spacing: 0.03em;
      animation: fadeIn 900ms cubic-bezier(.2,.8,.2,1) 920ms forwards;
    }

    .enter::after {
      content: "";
      position: absolute;
      top: 34px;
      left: 50%;
      width: 1px;
      height: 62px;
      background: var(--accent);
      transform: translateX(-50%);
      opacity: 0.75;
    }

    .status {
      right: 4.6vw;
      bottom: 8.5vh;
      font-size: clamp(11px, 0.9vw, 14px);
      animation-delay: 1020ms;
    }

    .tail {
      position: absolute;
      right: -0.4vw;
      bottom: -1.5vh;
      width: 29vw;
      min-width: 330px;
      max-width: 620px;
      height: 38vh;
      z-index: -1;
      opacity: 0;
      animation: tailIn 1400ms cubic-bezier(.2,.8,.2,1) 760ms forwards;
    }

    .tail path {
      fill: none;
      stroke: rgba(200, 184, 166, 0.48);
      stroke-width: 1.15;
      stroke-linecap: round;
    }

    .scrim {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: rgba(31, 31, 31, 0.025);
      opacity: 0;
      pointer-events: none;
      transition: opacity 420ms ease;
    }

    .scrim.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(420px, 100vw);
      height: 100vh;
      padding: 9vh 4.6vw 6vh;
      background: rgba(247, 244, 239, 0.88);
      backdrop-filter: blur(18px);
      border-left: 1px solid rgba(200, 184, 166, 0.28);
      transform: translateX(102%);
      transition: transform 620ms cubic-bezier(.2,.8,.2,1);
      z-index: 12;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 38px;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-close {
      position: absolute;
      top: 6.7vh;
      right: 3.25vw;
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
    }

    .drawer-close::before,
    .drawer-close::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 28px;
      height: 1.2px;
      background: var(--accent);
      transform-origin: center;
      transition: background 260ms ease, transform 260ms ease;
    }

    .drawer-close::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .drawer-close::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    .drawer-close:hover::before,
    .drawer-close:hover::after {
      background: var(--text);
    }

    .drawer-close:hover::before {
      transform: translate(-50%, -50%) rotate(38deg);
    }

    .drawer-close:hover::after {
      transform: translate(-50%, -50%) rotate(-38deg);
    }

    .drawer small {
      color: var(--secondary);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-list {
      list-style: none;
      display: grid;
      gap: 22px;
    }

    .nav-list a {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 18px;
      align-items: baseline;
      text-decoration: none;
      color: rgba(31, 31, 31, 0.82);
      font-size: clamp(24px, 3vw, 38px);
      font-weight: 300;
      letter-spacing: -0.04em;
      opacity: 0.92;
      transition:
        color 260ms cubic-bezier(.22,.61,.36,1),
        opacity 260ms cubic-bezier(.22,.61,.36,1),
        transform 260ms cubic-bezier(.22,.61,.36,1);
    }

    .nav-list a span:first-child {
      color: rgba(200, 184, 166, 0.72);
      font-size: 12px;
      letter-spacing: 0.05em;
      transition:
        color 260ms cubic-bezier(.22,.61,.36,1),
        opacity 260ms cubic-bezier(.22,.61,.36,1);
    }

    .nav-list a:hover {
      color: var(--text);
      opacity: 1;
      transform: translateX(4px);
    }

    .nav-list a:hover span:first-child {
      color: var(--accent);
      opacity: 1;
    }

    .drawer-note {
      max-width: 280px;
      color: var(--secondary);
      font-size: 12px;
      line-height: 1.8;
      letter-spacing: 0.015em;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pageEnter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    @keyframes lineReveal {
      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @keyframes tailIn {
      from {
        opacity: 0;
        transform: translate(16px, 12px);
      }
      to {
        opacity: 1;
        transform: translate(0, 0);
      }
    }

    @keyframes cursorPulse {
      0%,
      100% {
        opacity: 0.35;
      }

      48% {
        opacity: 0.86;
      }
    }

    @media (max-width: 720px) {
      html,
      body {
        min-height: -webkit-fill-available;
      }

      body {
        min-height: 100svh;
        min-height: 100dvh;
      }

      .page {
        height: 100vh;
        height: 100svh;
        height: 100dvh;
        min-height: 0;
      }

      .corner-label {
        top: max(34px, calc(var(--safe-area-top) + 18px));
        left: max(26px, calc(var(--safe-area-left) + 20px));
      }

      .menu-button {
        top: max(30px, calc(var(--safe-area-top) + 16px));
        right: max(26px, calc(var(--safe-area-right) + 20px));
        width: 31px;
      }

      .hero {
        top: 42%;
      }

      .wordmark {
        font-size: clamp(56px, 18vw, 88px);
      }

      .subtitle {
        margin-top: 30px;
      }

      .divider {
        margin-top: 32px;
      }

      .microcopy {
        top: calc(42% + 126px);
        font-size: 9px;
        white-space: normal;
        width: 80vw;
        line-height: 1.6;
      }

      .enter {
        bottom: max(12svh, calc(var(--safe-area-bottom) + 76px));
      }

      .status {
        right: max(26px, calc(var(--safe-area-right) + 20px));
        bottom: max(30px, calc(var(--safe-area-bottom) + 18px));
        font-size: 10px;
      }

      .tail {
        right: -32vw;
        width: 84vw;
        min-width: 0;
        opacity: 0.7;
      }

      .drawer {
        height: 100dvh;
        justify-content: flex-start;
        padding:
          max(clamp(94px, 15svh, 116px), calc(var(--safe-area-top) + 76px))
          max(34px, calc(var(--safe-area-right) + 28px))
          max(48px, calc(var(--safe-area-bottom) + 28px))
          max(34px, calc(var(--safe-area-left) + 28px));
        gap: 32px;
      }

      .drawer-close {
        top: max(30px, calc(var(--safe-area-top) + 16px));
        right: max(26px, calc(var(--safe-area-right) + 20px));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="Kiri private archive homepage">
    <div class="corner-label">est. 2026</div>

    <button class="menu-button" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="archive-drawer">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <section class="hero" aria-label="Archive introduction">
      <h1 class="wordmark" aria-label="kiri.">
        <span class="typewriter" aria-hidden="true">
          <span class="type-slot cursor" data-char="k"></span>
          <span class="type-slot" data-char="i"></span>
          <span class="type-slot" data-char="r"></span>
          <span class="type-slot" data-char="i"></span>
          <span class="type-slot" data-char="."></span>
        </span>
      </h1>
      <p class="subtitle">A private archive of moments</p>
      <div class="divider" aria-hidden="true"></div>
    </section>

    <p class="microcopy">a quiet place for images and memories</p>

    <div class="enter">enter the archive</div>
    <div class="status">last note</div>

    <svg class="tail" viewBox="0 0 620 520" aria-hidden="true">
      <path d="M598 42 C532 92 530 178 452 224 C390 260 305 254 240 302 C175 350 164 444 92 498" />
    </svg>
  </main>

  <div class="scrim" aria-hidden="true"></div>

  <aside class="drawer" id="archive-drawer" aria-hidden="true">
    <button class="drawer-close" type="button" aria-label="Close menu"></button>
    <small>archive index</small>
    <ul class="nav-list">
      <li><a href="category.html?category=kiri&page=1"><span>01</span><span>kiri</span></a></li>
      <li><a href="category.html?category=fragments&page=1"><span>02</span><span>fragments</span></a></li>
      <li><a href="category.html?category=games&page=1"><span>03</span><span>games</span></a></li>
      <li><a href="category.html?category=places&page=1"><span>04</span><span>places</span></a></li>
      <li><a href="category.html?category=others&page=1"><span>05</span><span>others</span></a></li>
      <li><a href="category.html?category=archives&page=1"><span>06</span><span>archives</span></a></li>
    </ul>
    <p class="drawer-note">A quiet index for fragments, photos, notes, and daily traces.</p>
  </aside>

  <script>
    const button = document.querySelector('.menu-button');
    const drawer = document.querySelector('.drawer');
    const scrim = document.querySelector('.scrim');
    const closeButton = document.querySelector('.drawer-close');
    const typeSlots = [...document.querySelectorAll('.type-slot')];

    function setDrawer(open) {
      button.classList.toggle('open', open);
      drawer.classList.toggle('open', open);
      scrim.classList.toggle('open', open);
      button.setAttribute('aria-expanded', String(open));
      button.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
      drawer.setAttribute('aria-hidden', String(!open));
    }

    button.addEventListener('click', () => {
      setDrawer(!drawer.classList.contains('open'));
    });

    closeButton.addEventListener('click', () => {
      setDrawer(false);
    });

    scrim.addEventListener('click', () => {
      setDrawer(false);
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        setDrawer(false);
      }
    });

    async function typeWordmark() {
      const pauses = [680, 190, 280, 210, 760];

      for (let index = 0; index < typeSlots.length; index += 1) {
        await new Promise((resolve) => setTimeout(resolve, pauses[index]));

        typeSlots[index].textContent = typeSlots[index].dataset.char;
        typeSlots[index].classList.add('visible');
        typeSlots[index].classList.remove('cursor');

        if (typeSlots[index + 1]) {
          typeSlots[index + 1].classList.add('cursor');
        }
      }
    }

    typeWordmark();
  </script>
</body>
</html>
