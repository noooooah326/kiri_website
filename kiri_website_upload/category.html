<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kiri — Category Archive</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="category-page">
  <main class="category-shell" aria-label="Category archive">
    <header class="category-header">
      <a class="home-link" href="index.html" aria-label="Back to Kiri homepage">kiri.</a>

      <div class="category-heading">
        <p class="eyebrow">archive / <span id="category-path">kiri</span></p>
        <h1 id="category-title">KIRI</h1>
        <p id="category-meta">category index / page 1</p>
      </div>

      <nav class="category-nav" aria-label="Archive categories">
        <a href="category.html?category=kiri&page=1" data-category-link="kiri">01 kiri</a>
        <a href="category.html?category=fragments&page=1" data-category-link="fragments">02 fragments</a>
        <a href="category.html?category=games&page=1" data-category-link="games">03 games</a>
        <a href="category.html?category=places&page=1" data-category-link="places">04 places</a>
        <a href="category.html?category=others&page=1" data-category-link="others">05 others</a>
        <a href="category.html?category=archives&page=1" data-category-link="archives">06 archives</a>
      </nav>
    </header>

    <section class="archive-grid" id="archive-grid" aria-live="polite"></section>

    <p class="archive-state" id="archive-state" role="status"></p>

    <nav class="pagination" aria-label="Archive pagination">
      <button class="page-button" id="prev-page" type="button">Prev</button>
      <span id="page-indicator">Page 1</span>
      <button class="page-button" id="next-page" type="button">Next</button>
    </nav>
  </main>

  <script type="module" src="category.js"></script>
</body>
</html>
